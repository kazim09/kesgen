<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Kesgen Blades</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #0b0b0b;
    color: #f2f2f2;
    font-family: Arial, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
}

.card {
    width: 100%;
    max-width: 520px;
    background: #121212;
    border: 1px solid #222;
    border-radius: 24px;
    padding: 40px;
    box-shadow:
        0 0 40px rgba(0,0,0,0.5),
        inset 0 0 0 1px rgba(255,255,255,0.02);
}

.logo {
    width: 300px;
    margin: 0 auto 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
}

.logo img {
    width: 100%;
    object-fit: contain;
}

.title {
    text-align: center;
    font-size: 34px;
    font-weight: 700;
    margin-bottom: 10px;
}

.subtitle {
    text-align: center;
    color: #888;
    font-size: 14px;
    margin-bottom: 36px;
}

.section {
    margin-bottom: 28px;
}

.section-title {
    font-size: 12px;
    letter-spacing: 2px;
    color: #666;
    margin-bottom: 14px;
}

.specs {
    display: flex;
    flex-direction: column;
    gap: 14px;
}

.row {
    display: flex;
    justify-content: space-between;
    gap: 20px;
    border-bottom: 1px solid #1f1f1f;
    padding-bottom: 12px;
}

.label {
    color: #777;
}

.value {
    text-align: right;
    font-weight: 500;
}

.description {
    color: #aaa;
    line-height: 1.6;
    font-size: 14px;
}

.footer {
    margin-top: 40px;
    text-align: center;
    color: #555;
    font-size: 12px;
    letter-spacing: 1px;
}

/* INSTAGRAM SLIDER */

.media-section {
    margin-top: 36px;
}

.slider {
    position: relative;
    width: 100%;
}

.slider-window {
    overflow: hidden;
    border-radius: 18px;
    background: #0e0e0e;
    border: 1px solid #222;
    min-height: 560px;
}

.slide {
    display: none;
    padding: 12px;
}

.slide.active {
    display: block;
}

.instagram-media {
    margin: 0 auto !important;
    min-width: 100% !important;
    max-width: 100% !important;
    width: 100% !important;
}

.slider-btn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    z-index: 5;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 1px solid #333;
    background: rgba(20,20,20,0.9);
    color: #fff;
    font-size: 26px;
    line-height: 1;
    cursor: pointer;
}

.slider-btn:hover {
    background: #222;
}

.prev {
    left: -18px;
}

.next {
    right: -18px;
}

.dots {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-top: 14px;
}

.dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #333;
    cursor: pointer;
}

.dot.active {
    background: #aaa;
}

.instagram-shell {
    background: #0e0e0e;
    border: 1px solid #222;
    border-radius: 18px;
    padding: 12px;
    overflow: hidden;
}

@media (max-width: 520px) {
    .card {
        padding: 28px;
    }

    .logo {
        width: 240px;
    }

    .prev {
        left: 8px;
    }

    .next {
        right: 8px;
    }
}
</style>
</head>

<body>

<div class="card">

    <div class="logo">
        <img src="../../img/logo.svg" alt="Kesgen Blades Logo">
    </div>

    <div class="title">Omnivore</div>

    <div class="subtitle">Full Size</div>

    <div class="section">
        <div class="section-title">SPECIFICATIONS</div>

        <div class="specs">

            <div class="row">
                <div class="label">Blade Steel</div>
                <div class="value">CPM Magnacut</div>
            </div>

            <div class="row">
                <div class="label">Hardness</div>
                <div class="value">63 HRC</div>
            </div>

            <div class="row">
                <div class="label">Handle Material</div>
                <div class="value">Titanium</div>
            </div>

            <div class="row">
                <div class="label">Locking System</div>
                <div class="value">RailLock v4</div>
            </div>

            <div class="row">
                <div class="label">Finish</div>
                <div class="value">Acid Stonewash</div>
            </div>

            <div class="row">
                <div class="label">Build Date</div>
                <div class="value">02 / 2026</div>
            </div>

            <div class="row">
                <div class="label">Serial Number</div>
                <div class="value">#007</div>
            </div>

        </div>
    </div>

    <div class="section">
        <div class="section-title">NOTES</div>

        <div class="description">
            First prototype of the Omnivore model.<br>
            Hand made in Berlin.
        </div>
    </div>

    <div class="section media-section">
        <div class="section-title">MEDIA</div>

        <div class="slider">

            <button class="slider-btn prev" onclick="slideInstagram(-1)">‹</button>

            <div class="slider-window instagram-shell">

                <div class="slide active">
                    <blockquote class="instagram-media"
                        data-instgrm-captioned
                        data-instgrm-permalink="https://www.instagram.com/reel/DUVfUvcDGdC/"
                        data-instgrm-version="14">
                    </blockquote>
                </div>

                <div class="slide">
                    <blockquote class="instagram-media"
                        data-instgrm-captioned
                        data-instgrm-permalink="https://www.instagram.com/reel/DVYHOqejBNh/"
                        data-instgrm-version="14">
                    </blockquote>
                </div>

                <div class="slide">
                    <blockquote class="instagram-media"
                        data-instgrm-captioned
                        data-instgrm-permalink="https://www.instagram.com/p/DUQtzUIDLEE/"
                        data-instgrm-version="14">
                    </blockquote>
                </div>

                <div class="slide">
                    <blockquote class="instagram-media"
                        data-instgrm-captioned
                        data-instgrm-permalink="https://www.instagram.com/p/DTIxwe9DMMm/"
                        data-instgrm-version="14">
                    </blockquote>
                </div>

                <div class="slide">
                    <blockquote class="instagram-media"
                        data-instgrm-captioned
                        data-instgrm-permalink="https://www.instagram.com/reel/DTk1_LPDLHx/"
                        data-instgrm-version="14">
                    </blockquote>
                </div>

            </div>

            <button class="slider-btn next" onclick="slideInstagram(1)">›</button>

        </div>

        <div class="dots" id="dots"></div>
    </div>

    <div class="footer">
        kesgenblades.com
    </div>

</div>

<script async src="//www.instagram.com/embed.js"></script>

<script>
let currentSlide = 0;

const slides = document.querySelectorAll('.slide');
const dotsContainer = document.getElementById('dots');

slides.forEach((_, index) => {
    const dot = document.createElement('div');
    dot.classList.add('dot');

    if (index === 0) {
        dot.classList.add('active');
    }

    dot.addEventListener('click', () => {
        showSlide(index);
    });

    dotsContainer.appendChild(dot);
});

const dots = document.querySelectorAll('.dot');

function showSlide(index) {
    slides[currentSlide].classList.remove('active');
    dots[currentSlide].classList.remove('active');

    currentSlide = index;

    slides[currentSlide].classList.add('active');
    dots[currentSlide].classList.add('active');

    if (window.instgrm) {
        window.instgrm.Embeds.process();
    }
}

function slideInstagram(direction) {
    let nextSlide = currentSlide + direction;

    if (nextSlide < 0) {
        nextSlide = slides.length - 1;
    }

    if (nextSlide >= slides.length) {
        nextSlide = 0;
    }

    showSlide(nextSlide);
}
</script>

</body>
</html>
